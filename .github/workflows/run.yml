name: GLaDOS Checkin

on:
  schedule:
    # 第1次：UTC 22:41 = 北京时间 06:41
    - cron: '41 22 * * *'
    # 第2次：UTC 09:41 = 北京时间 17:41
    - cron: '41 9 * * *'
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  daily-checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Run Checkin Script
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
        run: python glados.py

      - name: Update Workflow Heartbeat
        if: github.event_name == 'schedule'
        run: |
          New-Item -ItemType Directory -Force -Path .github/heartbeat | Out-Null
          Set-Content -Path .github/heartbeat/last_schedule_utc.txt -Value "$(Get-Date -AsUTC -Format 'yyyy-MM-ddTHH:mm:ssZ')"
        shell: pwsh

      - name: Commit Workflow Heartbeat
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat/last_schedule_utc.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: update workflow heartbeat [skip ci]"
          git push

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debug-evidence
          path: evidence.png
          retention-days: 1
